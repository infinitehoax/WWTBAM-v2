{% extends "base.html" %}
{% block title %}Waiting...{% endblock %}
{% block body %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#1E3A8A 0%,#0A0E2E 70%);">
  <div style="text-align:center;padding:30px;">
    <div style="font-size:4rem;margin-bottom:20px;animation:spin 3s linear infinite;">⏳</div>
    <div style="font-family:var(--font-display);font-size:1.4rem;color:var(--gold);margin-bottom:10px;">Waiting for Host</div>
    <div style="color:rgba(255,255,255,0.45);">The game will start shortly...</div>
    <a href="/play" style="display:inline-block;margin-top:24px;color:rgba(255,215,0,0.5);font-size:0.85rem;">← Back to join</a>
  </div>
</div>
<style>
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>
{% endblock %}
