{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block extra_head %}
<style>
  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1E3A8A 0%, #0A0E2E 70%);
  }
  .login-card {
    background: rgba(13,27,75,0.9); border: 1px solid rgba(255,215,0,0.3);
    border-radius: 20px; padding: 50px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 0 60px rgba(255,215,0,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    text-align: center;
  }
  .login-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5); margin-bottom: 6px; }
  .login-sub { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 36px; }
  .input-wrap { margin-bottom: 20px; text-align: left; }
  .input-wrap label { display: block; color: rgba(255,215,0,0.7); font-size: 0.8rem;
    font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .input-wrap input {
    width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.25); border-radius: 10px; color: white;
    font-family: var(--font-body); font-size: 1rem; outline: none; transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: var(--gold); background: rgba(255,215,0,0.05); }
  .error-msg { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.4);
    border-radius: 8px; padding: 10px 14px; color: #FCA5A5; font-size: 0.85rem; margin-bottom: 20px; }
  .btn-login { width: 100%; padding: 14px; font-size: 1rem; border-radius: 10px; }
  .crown { font-size: 3rem; margin-bottom: 16px; }
</style>
{% endblock %}
{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <div class="crown">👑</div>
    <div class="login-title">Control Room</div>
    <div class="login-sub">Crystal Brooks College — Admin Access</div>
    {% if error %}<div class="error-msg">{{ error }}</div>{% endif %}
    <form method="POST">
      <div class="input-wrap">
        <label>Password</label>
        <input type="password" name="password" placeholder="Enter admin password" autofocus>
      </div>
      <button type="submit" class="btn btn-gold btn-login">Enter Control Room</button>
    </form>
  </div>
</div>
{% endblock %}
